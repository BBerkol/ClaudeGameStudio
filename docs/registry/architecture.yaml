# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: mpb_overlay_atlas_packing
    status: active
    description: "Damage overlay textures (spr_dmg_overlay_*.png) must never be packed into a Sprite Atlas. MaterialPropertyBlock.SetTexture() uses absolute UVs — atlas UV remapping does not apply, causing incorrect overlay rendering."
    why: "Sprite Atlas UV remapping is not applied to textures set via MaterialPropertyBlock. If overlay textures are atlas-packed, they will render with wrong UVs on all vehicle slot renderers."
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    added: 2026-04-19

  - pattern: per_frame_mpb_update
    status: active
    description: "MaterialPropertyBlock.Set*() calls for vehicle slot renderers must not be called directly in event handlers or Update(). Use a dirty flag — set on state-change event, flush in LateUpdate() at most once per frame per slot."
    why: "Multiple damage events in a single frame (e.g., AoE hit affecting multiple slots) would each trigger a GPU state change. Dirty flag batches all updates to a single flush per frame."
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    added: 2026-04-19

  - pattern: vehicle_mutation_outside_whitelist
    status: active
    description: "IVehicleMutator method calls (InstallPart / RemovePart / ApplyDamage / AddArmor / AddPlating / ApplyStatus / RemoveStatus / TickStatuses / Repair) outside the registered consumer whitelist (combat-system, status-effects-system, economy-system, loot-system, enemy-ai) are forbidden. Adding a new caller requires updating `interfaces.vehicle_state_access.consumers` in this registry."
    why: "The IVehicleView / IVehicleMutator split is enforced by code review, not by language — both interfaces are implemented by the same concrete `Vehicle` class. Unvetted callers bypass invariants such as MaxArmor recompute on InstallPart, granted-card cleanup on RemovePart, and the F-VP2 plating→armor→Hp damage order. Each whitelisted consumer was vetted against these invariants; new ones must be too."
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-25

  - pattern: cast_vehicle_view_to_mutator
    status: active
    description: "Code must never cast `IVehicleView` to `IVehicleMutator` to obtain mutation rights. Mutation requires an explicit `IVehicleMutator` constructor parameter / DI registration; consumers that should not mutate must take only `IVehicleView`."
    why: "The concrete `Vehicle` class implements both interfaces, so the cast technically succeeds and silently grants write access. This bypasses the read-only contract that ADR-0001 locks for visual subscribers (combat-hud, part-inspect-ui, post-combat-ui) and breaks the auditability of the consumer whitelist registered in `interfaces.vehicle_state_access`."
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-25

  - pattern: card_system_writes_pity_counter
    status: active
    description: "Code in WastelandRun.Cards (or any Card System component) must never write to `RarePityCounter` — neither as field assignment, nor via `LootStateDTO` mutation, nor via any indirect facade. Card System receives the counter as an `int rarePityCounter` parameter to `ICardRewardGenerator.Generate(...)` and is permitted to read only. All writes happen in Loot & Reward per Loot & Reward GDD §C.3 step 9 (increment if no Rare drawn, reset to 0 if any Rare appeared)."
    why: "Resolves the ADR-0006 TD-ADR B1 contradiction with ADR-0004's writer-owns-DTO-field principle (Alternative 4 explicitly rejected mixed ownership). Two-writer ownership of a single field produces races at save boundary, makes save-load round-trip non-deterministic, and breaks ADR-0003 reproducibility (replaying a seeded run could see different pity progression depending on flush order). Single-writer (L&R) keeps the entire pity-counter lifecycle inside one system that already owns LootStateDTO."
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    enforcement: "CI grep — fail build if any file under Assets/Scripts/Cards/ or Assets/Scripts/Gameplay/Cards/ contains `RarePityCounter\\s*[+\\-*/]?=` or `RarePityCounter\\s*\\+\\+` or `\\.RarePityCounter\\s*=`. Allowed reads stay; only writes fail the regex."
    added: 2026-04-25

  - pattern: pre_bake_card_description_tokens
    status: active
    description: "CardDefinitionSO.RulesText must contain raw token templates (e.g., `Deal {damage} damage. Bonus: {bonus} if behind.`) — never resolved strings. TokenResolver runs at draft generation time inside ICardRewardGenerator.Generate, after the chassis/mastery/state context is known. Editor tooling that resolves tokens for SO author preview is permitted ONLY if the resolved string is discarded and never written back to RulesText."
    why: "Token values depend on runtime context (current Plating stacks, Mastery level, conditional bonus eligibility, chassis-specific damage scaling). Pre-baking at editor time would lock incorrect values into every CardDraft offered. Pre-baking also defeats deterministic save-load: a card's RulesText would diverge between players who installed different parts but received the same CardId, breaking save portability and reproduction reports."
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    enforcement: "Validation Criterion 7 (per ADR-0006): unit test loads any CardDefinitionSO via Addressables and asserts RulesText contains at least one `{` character; conversely asserts CardDraft.RulesText (post-Generate) contains zero `{` characters."
    added: 2026-04-25

  - pattern: unity_random_in_card_draws
    status: active
    description: "Code in WastelandRun.Cards (and the entire ICardRewardGenerator implementation chain) must not call `UnityEngine.Random.*`, `new System.Random()` (no-arg ctor uses time-seed), `DateTime.Now`, `DateTime.UtcNow`, `Stopwatch.GetTimestamp`, or `Guid.NewGuid()` for any selection or weighting decision. The caller-provided `System.Random rng` parameter is the only permitted RNG source — extends ADR-0003's discipline into the Card System namespace."
    why: "Card draws are seeded from `RunSeed ^ stepIndex` per ADR-0003. Any non-deterministic call inside the draw pipeline breaks save-load reproducibility, breaks crash-recovery determinism, breaks balance-tuning replays (designers run thousands of draws against fixed seeds to validate distribution), and breaks the deterministic 100k-draw SHA-256 unit test specified in ADR-0006 Migration step 3."
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    enforcement: "CI grep extends ADR-0003's existing forbidden-token sweep to add Assets/Scripts/Cards/** and Assets/Scripts/Gameplay/Cards/** to the path list (same regex set: `UnityEngine\\.Random`, `new System\\.Random\\(\\)`, `DateTime\\.(Now|UtcNow)`, `Stopwatch\\.GetTimestamp`, `Guid\\.NewGuid`)."
    added: 2026-04-25

  - pattern: polymorphic_serialize_reference_for_effects
    status: active
    description: "CardEffectSO and EffectConditionSO hierarchies must use sealed-subclass-per-type with `[CreateAssetMenu]` (e.g., `DamageEffectSO`, `ApplyStatusEffectSO`, `DrawEffectSO` … each a separate ScriptableObject asset). Do NOT use `[SerializeReference]` to inline a polymorphic effect-list inside CardDefinitionSO; do NOT use a single MegaEffectSO with a `EffectKind` enum + branched fields."
    why: "[SerializeReference] requires runtime type names in YAML, which couple save data to assembly-qualified class names — refactoring (rename, namespace move) silently invalidates every saved CardDefinitionSO referencing the old name, with no editor warning. Sealed-subclass-per-asset means each effect is an independent .asset file with stable GUID — refactor-safe, diff-friendly in Git, and drag-and-drop authoring for designers. Mega-effect with enum branching is the WastelandRun anti-pattern equivalent of the 'God object' — every new effect type forces touching one shared file."
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    added: 2026-04-25

