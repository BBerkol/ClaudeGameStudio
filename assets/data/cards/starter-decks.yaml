# Wasteland Run — Starter Deck Card Specifications
# Source of truth for Unity asset authoring (Story 010 / TR-card-011)
#
# AUTHORING INSTRUCTIONS
# ----------------------
# For each card below:
#   1. In Unity: Assets > Create > Wasteland > Card > Definition
#   2. Set each field exactly as specified. CardId format: [chassis]_[family]_[seq]
#   3. For each effect, create the matching EffectSO asset (e.g. Assets > Create > Wasteland > Card > Effects > [type])
#      and reference it in the card's Effects list.
#   4. Save — OnValidate fires and logs errors for any violations.
#
# VALIDATION RULES ENFORCED BY OnValidate (Story 002)
# ---------------------------------------------------
# - CardId must match ^[a-z]+_[a-z]+_[0-9]{3}$
# - EnergyCost >= 0
# - MerchantPrice != 30
# - Keywords: Ethereal and Retain are mutually exclusive
# - Control-family cards must have at least one DamageEffectSO with Amount >= 1
# - BypassPlating: cannot target Frame; cannot use AllEnemySubsystems; requires explicit targets
# - BaseDamage must equal first DamageEffectSO.Amount and be >= 1 on damage cards
#
# FAMILY DISTRIBUTION CONSTRAINTS (GDD Deck Composition Rules)
# -----------------------------------------------------------
# Scout:  Precision >= 3, Maneuver >= 2, Repair >= 1. No Assault-family cards.
# Assault: Assault >= 3 (of which BroadAssault >= 2), Precision >= 2, Repair >= 1, Maneuver <= 1
# BroadAssault = TargetType: AllEnemySubsystems OR TargetType: EnemySubsystem + ValidSubsystemTargets: [Frame]

---
