  - name: ScrapRefundRate
    status: active
    source: design/gdd/vehicle-and-part-mechanics.md
    referenced_by:
      - design/gdd/vehicle-and-part-mechanics.md
      - design/gdd/scrap-economy.md
    value: 0.40
    unit: multiplier (float)
    min: 0.20
    max: 0.99
    notes: "Fraction of InstallBaseCost returned on standalone scrap. Authority: vehicle-and-part-mechanics.md F-VPM2. Static formula: ScrapRefund(rarity) = max(1, Floor(InstallBaseCost[rarity] × ScrapRefundRate)) → Common=4, Uncommon=10, Rare=20 at default. Hard constraint: must be < 1.0 — at ≥ 1.0 the 'removal is always a loss' invariant breaks silently. Lower bound: must be ≥ 0.20 — at < 0.20 Rare mid-run pivots become economically unrecoverable (74 Scrap in, 1 Scrap out), eliminating Pillar 4 agency without runtime signal. Owning SO must enforce OnValidate clamp [0.20, 0.99]; reject and log error at both bounds. Tuning safe range: 0.20–0.50."
    added: 2026-05-20
    revised: "2026-05-21"

