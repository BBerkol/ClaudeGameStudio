  - name: HostileTiltDelta
    status: active
    source: design/gdd/node-encounter.md
    referenced_by:
      - design/gdd/node-map.md
      - design/gdd/node-encounter.md
    value: "{Treasure: -5, Ambush: +15, Windfall: -10, Convert: 0}"
    unit: asymmetric integer vector (weight deltas, out of 100)
    notes: "RC-F1 route constraint. Applied to Event payload weights when Frame subsystem is Degraded/Offline at beacon commit time. Canonical representation per Node Encounter D.2 is the 4-axis asymmetric vector {Treasure: -5, Ambush: +15, Windfall: -10, Convert: 0} (integer, out of 100) — NOT a scalar. Base weights {35/20/30/15} transform to tilted {30/35/20/15}. Sum of deltas = 0 (redistributes weight, does not inflate total). Legacy scalar `0.15` shorthand refers to the Ambush-axis headline magnitude only. Hidden from player in numeric form; surfaced via 3-channel hover/focus tell per Node Encounter H.3/I.4 (rust-shimmer + sub-200Hz audio +3dB + gamepad haptic motorLevel 0.15) — no tooltip/tint/numeric readout permitted."
    added: 2026-04-21
    revised: 2026-04-23

