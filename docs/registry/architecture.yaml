# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-04-27"  # ADR-0005 + ADR-0006 flipped Proposed → Accepted

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: vehicle_slot_damage_state
    status: active
    owner_system: vehicle-part-system
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    interface: "IVehicleView.GetDamageState(SlotType) → DamageState (read-only enum, 4 values: Empty/Functional/Degraded/Offline — ADR-0005)"
    write_access: IVehicleMutator-only  # Combat (ApplyDamage(slot,amount,DamageSource), AddArmor, AddPlating, ApplyStatus, Repair, TickStatuses), Status Effects (ApplyDamage DOT, ApplyStatus, RemoveStatus, TickStatuses), Economy (InstallPart, RemovePart, Repair), Loot (InstallPart), Enemy AI (ApplyStatus)
    referenced_by:
      - docs/architecture/adr-0001-visual-vehicle-part-system.md
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-19
    revised: 2026-04-25  # ADR-0005: 4-value DamageState (added Empty); ApplyDamage gains DamageSource; expanded write whitelist

  - state: vehicle_part_catalog
    status: active
    owner_system: vehicle-part-system
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    interface: "IPartCatalog.GetParts(SlotType, PartRarity, ChassisType) → IReadOnlyList<IPartData>  — stateless query, no internal RNG (ADR-0003 discipline: caller owns the System.Random)"
    write_access: editor-authoring-only  # PartDefinitionSO assets are authored in Unity editor; runtime catalog is read-only after Addressables load
    referenced_by:
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-25
    revised: ""

  - state: card_pool_catalog
    status: active
    owner_system: card-system
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    interface: "ICardCatalog.GetCards(ChassisType, int mastery) → IReadOnlyList<ICardData>  — stateless query, no internal RNG (ADR-0003 discipline: caller owns the System.Random). Sibling IMasteryWeights.GetWeights(ChassisType, int mastery) for slot-bias / family-mix lookups."
    write_access: editor-authoring-only  # CardDefinitionSO + ChassisMasteryDefinitionSO assets authored in Unity editor; runtime catalogs are read-only after Addressables load (two siblings: AddressablesCardCatalog + AddressablesMasteryCatalog)
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
    added: 2026-04-25
    revised: ""

  - state: card_deck_state
    status: active
    owner_system: combat-system
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    interface: "CardSystemDTO { string[] Deck; string[] Discard; string[] Exhausted; Dictionary<string,int> CardCopyCounts }  — accessed only at run-save / run-load boundaries; live combat reads/writes go through Combat's in-memory CardZoneState. Note: RarePityCounter is NOT in this DTO (lives in LootStateDTO per Decision §'Pity counter authority' — L&R writes & persists)."
    write_access: combat-system-only  # Combat owns Deck/Discard/Exhausted transitions per Card System GDD F1; reward acceptance flow appends new CardId via combat-system facade, not direct dictionary write
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
      - docs/architecture/adr-0004-save-persistence.md
    added: 2026-04-25
    revised: ""

  - state: rare_pity_counter
    status: active
    owner_system: loot-reward-system
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    interface: "Persisted in LootStateDTO.RarePityCounter (int). Read by Card System only via ICardRewardGenerator.Generate(...) parameter — Card System NEVER mutates. L&R writes per Loot & Reward GDD §C.3 step 9 (increment if no Rare drawn, reset to 0 if any Rare appeared)."
    write_access: loot-reward-system-only  # Decision §'Pity counter authority': writer-owns-DTO-field per ADR-0004 Alternative 4 rejection; Card System is read-only consumer
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
      - design/gdd/loot-reward.md       # GDD F.1 + §C.3 step 9 + AC-LR15..LR18, AC-LR34, AC-LR42
      - design/gdd/card-system.md       # GDD §F3 + ICardRewardGenerator.Generate doc comment (read-only)
      - design/gdd/scrap-economy.md     # GDD §EC-SE7 + §H.4 (PityScrapAward consumer, ownership note)
    added: 2026-04-25
    revised: ""

