# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: vehicle_part_sprite_rendering
    status: active
    api: "URP Sprite Lit Shader Graph + MaterialPropertyBlock (_DamageAmount float, _DamageOverlay Texture2D)"
    not: "SpriteRenderer.sprite swap per damage state; separate SpriteRenderer overlay GameObjects"
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    reason: "Sprite swap requires 3× art assets (120-180 sprites); layered GameObjects add unnecessary draw calls. MPB with shared overlays keeps art budget to ~60 base sprites."
    referenced_by:
      - docs/architecture/adr-0001-visual-vehicle-part-system.md
    added: 2026-04-19
    revised: ""

  - purpose: vehicle_part_asset_loading
    status: active
    api: "Addressables LoadAssetAsync<Sprite> / LoadAssetsAsync<ScriptableObject> with try/catch + handle.IsValid() finally guard"
    not: "Resources.Load; direct sprite/SO references on ScriptableObjects; Addressables without exception handling"
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    reason: "Unity 6.2+ Addressables throws on failure (not null). handle.IsValid() guard prevents double-exception if load throws before handle assignment."
    referenced_by:
      - docs/architecture/adr-0001-visual-vehicle-part-system.md
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md  # AddressablesPartCatalog applies the same try/catch + handle.IsValid pattern when loading the "part-definitions" label
      - docs/architecture/adr-0006-card-system-data-authoring.md  # AddressablesCardCatalog ("card-definitions") + AddressablesMasteryCatalog ("chassis-mastery-definitions") siblings apply the same try/catch + handle.IsValid pattern
    added: 2026-04-19
    revised: 2026-04-25  # ADR-0005 + ADR-0006: extended scope to SO catalog loading; same exception-handling contract

  - purpose: il2cpp_link_xml_for_so_interface_loading
    status: active
    api: "link.xml entries with `preserve=\"all\"` for ScriptableObject types referenced only via interface (e.g., PartDefinitionSO when runtime references go through IPartData)"
    not: "Reflection-only retention; relying on Addressables registration to keep types alive; UnityEngine.Scripting.Preserve attribute alone (does not preserve serialized field metadata reliably under IL2CPP managed-stripping=High)"
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    reason: "When concrete SO types are referenced only through interface handles, IL2CPP's static analyzer marks them unreachable and strips them. Stripped types fail to instantiate via Addressables in standalone — never reproduces in editor. link.xml is the only reliable preservation mechanism for SO + serialized field metadata."
    referenced_by:
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
      - docs/architecture/adr-0006-card-system-data-authoring.md  # CardDefinitionSO + 8 *EffectSO subclasses + 3 *ConditionSO subclasses + ChassisMasteryDefinitionSO + EffectConditionProjection static helper all require link.xml preservation (interface-only references at runtime via ICardData/ICardEffect/ICardEffectCondition/IMasteryWeights)
    added: 2026-04-25
    revised: 2026-04-25  # ADR-0006: extended pattern to card-system SO hierarchy; static helper class also requires preservation

  - purpose: vehicle_save_dto_distributed_schema
    status: active
    api: "VehicleStateDTO sealed record with `public const string SystemId = \"vehicle-state\"` + `public const int SchemaVersion = 1`, registered via the ADR-0004 distributed schema registry"
    not: "Centralized SystemId enum or table; runtime-discovered SystemIds via reflection; SchemaVersion stored as instance field; DTOs holding ScriptableObject references (must use string PartId)"
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    reason: "ADR-0004 mandates SystemId + SchemaVersion as compile-time constants on each per-system DTO; uniqueness is CI-enforced by grep. CurrentArmor is intentionally excluded from the DTO (V&P GDD line 34: resets per combat); ActiveStatuses live within combat scope only."
    referenced_by:
      - docs/architecture/adr-0004-save-persistence.md
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-25
    revised: ""

  - purpose: card_addressables_label
    status: active
    api: "Two sibling Addressables labels — 'card-definitions' (CardDefinitionSO assets) and 'chassis-mastery-definitions' (ChassisMasteryDefinitionSO assets) — both gated in build profile by extending ADR-0005's EditorBuildPreprocessor to assert each label is included before build proceeds"
    not: "Single combined label; per-chassis labels (e.g., 'cards-scout', 'cards-truck'); Resources.Load; runtime-discovered labels via reflection; loading either catalog without the EditorBuildPreprocessor build-time gate"
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    reason: "Two siblings (not nested): AddressablesCardCatalog and AddressablesMasteryCatalog have independent lifecycles and partition by different keys (ChassisPool vs ChassisType). Constructor injection composes them at bootstrap (`new RewardDrawAlgorithm(cardCatalog, masteryCatalog, tokens)`) per Decision §'Sibling catalog architecture' — keeps each catalog's responsibility narrow, matches ADR-0003 DI discipline. Per-chassis labels rejected: cross-chassis cards exist (Universal pool), so label-per-chassis would either duplicate assets or require a meta-label."
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
    added: 2026-04-25
    revised: ""

  - purpose: card_token_resolution_timing
    status: active
    api: "TokenResolver.Resolve(rawTemplate, context) called at draft-generation time (inside ICardRewardGenerator.Generate, before CardDraft is returned). Tokens supported: {damage}, {damage.N}, {bonus}, {heal}, {plating}, {armor}, {draws}, {energy}, {stacks}, {duration}, {cost}"
    not: "Pre-baking resolved strings into CardDefinitionSO.RulesText at editor time; resolving tokens at HUD-render time; UnityEngine.UI.Text token-substitution helpers; resolving tokens inside CardEffectSO.ToRuntime() projection (CardDraft is the binding boundary, not ICardEffect)"
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    reason: "Token values depend on runtime context (current Plating stacks, Mastery level, conditional bonus eligibility) — pre-baking would bind the wrong values. Resolving at draft time means CardDraft.RulesText is final at hand-off to L&R, no downstream consumer needs to re-resolve. Resolving in ToRuntime would tie projection to runtime context the projection doesn't have access to."
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
    added: 2026-04-25
    revised: ""

  - purpose: card_save_dto_distributed_schema
    status: active
    api: "CardSystemDTO sealed record with `public const string SystemId = \"card-system\"` + `public const int SchemaVersion = 1`, registered via the ADR-0004 distributed schema registry. Fields: Deck, Discard, Exhausted (string[] of CardIds) + CardCopyCounts (Dictionary<string,int>). RarePityCounter is INTENTIONALLY ABSENT — owned by LootStateDTO per state_ownership.rare_pity_counter."
    not: "Centralized SystemId enum or table; runtime-discovered SystemIds via reflection; SchemaVersion stored as instance field; DTO holding ScriptableObject references (must use string CardId); persisting RarePityCounter in CardSystemDTO (writer-owns-DTO-field per ADR-0004 Alternative 4 rejection — L&R writes pity, L&R persists pity)"
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    reason: "ADR-0004 mandates SystemId + SchemaVersion as compile-time constants on each per-system DTO; uniqueness is CI-enforced by grep. CardSystemDTO is the third instance of this pattern (after VehicleStateDTO + LootStateDTO). Pity counter exclusion resolves the TD-ADR B1 contradiction with ADR-0004 cleanly: each DTO is owned by exactly one writer."
    referenced_by:
      - docs/architecture/adr-0004-save-persistence.md
      - docs/architecture/adr-0006-card-system-data-authoring.md
    added: 2026-04-25
    revised: ""

