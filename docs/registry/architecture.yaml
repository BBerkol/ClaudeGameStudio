# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: vehicle_state_access
    status: active
    pattern: direct_call
    producer: vehicle-part-system
    consumers:
      - combat-system          # reads IVehicleView for subsystem state; writes via IVehicleMutator.ApplyDamage(slot,amount,DamageSource), AddArmor, AddPlating, ApplyStatus, Repair, TickStatuses
      - status-effects-system  # writes via IVehicleMutator.ApplyDamage (DOT, source=Status), ApplyStatus, RemoveStatus, TickStatuses (ADR-0005 / pending ADR-0007)
      - enemy-ai               # writes via IVehicleMutator.ApplyStatus on the target vehicle reference (ADR-0005 / pending ADR-0011)
      - economy-system         # reads IVehicleView for part values; writes via IVehicleMutator.InstallPart/RemovePart/Repair
      - loot-system            # writes via IVehicleMutator.InstallPart on part drop
      - combat-hud             # reads IVehicleView for display; subscribes to OnSlotDamageStateChanged event
      - part-inspect-ui        # reads IVehicleView for part display
      - post-combat-ui         # reads IVehicleView for install/scrap flow
    adr: docs/architecture/adr-0001-visual-vehicle-part-system.md
    signal_signature: "event Action<SlotType, DamageState, DamageState> OnSlotDamageStateChanged  // (slot, from, to) — ADR-0005"
    write_signatures:
      - "ApplyDamage(SlotType slot, int amount, DamageSource source)  // ADR-0005; DamageSource ∈ {Card, Status, Environment}"
      - "Repair(SlotType slot, int hpRestored, bool canReviveOffline)"
      - "AddPlating(SlotType slot, int stacks)"
      - "AddArmor(int amount)"
      - "ApplyStatus(StatusType type, int duration, int stacks, SlotType? targetSlot)"
      - "RemoveStatus(StatusType type, SlotType? targetSlot)  // ADR-0005"
      - "TickStatuses()  // end-of-turn; DOT internally routes through ApplyDamage(source=Status)"
      - "InstallPart(SlotType slot, IPartData part)"
      - "RemovePart(SlotType slot)"
    referenced_by:
      - docs/architecture/adr-0001-visual-vehicle-part-system.md
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-19
    revised: 2026-04-25  # ADR-0005: 3-arg event signature (slot, from, to); ApplyDamage gains DamageSource; RemoveStatus + TickStatuses added; expanded consumer set

  - contract: part_catalog_lookup
    status: active
    pattern: direct_call
    producer: vehicle-part-system
    consumers:
      - loot-system            # GetParts(slot, rarity, chassis) for reward generation; caller owns RNG per ADR-0003
      - economy-system         # GetParts(slot, rarity, chassis) for chopshop inventory; PreviewInstall for compare-panel UI
      - node-map               # PreviewInstall for upcoming-encounter compare hints (ADR-0009)
      - part-inspect-ui        # GetById(partId) for inventory display
    adr: docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    method_signatures:
      - "IReadOnlyList<IPartData> GetParts(SlotType slot, PartRarity rarity, ChassisType chassis)  // stateless"
      - "IPartData GetById(string partId)"
      - "VehicleStatePreview PreviewInstall(IVehicleView vehicle, SlotType slot, IPartData candidate)  // pure read; does not mutate"
    forbidden:
      - "IPartCatalog must not own a System.Random or any RNG state — selection happens in the caller per ADR-0003"
      - "PartDefinitionSO references must not leak across the WastelandRun.Vehicle assembly boundary; runtime types are IPartData/IChassisData (POCO interfaces)"
    referenced_by:
      - docs/architecture/adr-0005-vehicle-poco-part-catalog.md
    added: 2026-04-25
    revised: ""

  - contract: card_reward_generation
    status: active
    pattern: direct_call
    producer: card-system
    consumers:
      - loot-reward-system          # Loot & Reward §C.3 step 8 calls Generate(...) per CardOffer; passes pity counter as input, writes counter post-draw
      - node-encounter-handlers     # event nodes that grant card offers (Node Encounter GDD undesigned 📌 routes through same Generate signature)
    adr: docs/architecture/adr-0006-card-system-data-authoring.md
    method_signatures:
      - "CardDraft[] ICardRewardGenerator.Generate(ChassisType chassis, int mastery, int rarePityCounter, int drawCount, IReadOnlyList<string> currentDeckCardIds, System.Random rng)  // canonical 6-arg signature"
    contract_invariants:
      - "Returns Length == drawCount (success) OR Length == 0 (empty Rare-pool pity signal). NEVER partial."
      - "rarePityCounter is INPUT only — Card System reads to gate Rare draws but is forbidden from mutating. Writer is loot-reward-system per state_ownership.rare_pity_counter."
      - "rng is the caller-owned System.Random per ADR-0003 — Card System must NOT instantiate UnityEngine.Random or new System.Random() internally."
      - "currentDeckCardIds drives copy-limit filtering; empty list = no copies installed yet."
      - "Empty[] return at counter==8 + empty Rare pool triggers Loot & Reward's PityScrapAward(40) substitution per Loot & Reward GDD §C.3 step 7."
    referenced_by:
      - docs/architecture/adr-0006-card-system-data-authoring.md
      - design/gdd/card-system.md     # ICardRewardGenerator definition (authoritative)
      - design/gdd/loot-reward.md     # AC-LR15, AC-LR42 (call site)
    added: 2026-04-25
    revised: ""

